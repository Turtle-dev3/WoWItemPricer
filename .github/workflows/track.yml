name: Track WoW prices
on:
  schedule:
    - cron: "0 10 * * *"   # 12:00 Denmark summer / 11:00 winter (UTC, no DST)
  workflow_dispatch:
permissions:
  contents: write
jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run tracker
        env:
          BLIZZARD_CLIENT_ID: ${{ secrets.BLIZZARD_CLIENT_ID }}
          BLIZZARD_CLIENT_SECRET: ${{ secrets.BLIZZARD_CLIENT_SECRET }}
        run: |
          ITEMS=$(grep -vE '^\s*(#|$)' items.txt | tr '\n' ' ')
          python main.py $ITEMS --region eu --days 7
      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ charts/
          git diff --staged --quiet || (git commit -m "data: snapshot $(date -u +'%Y-%m-%d %H:%M UTC')" && git push)
